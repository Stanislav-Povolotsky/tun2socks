name: Publish Go Releases

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          check-latest: true
          go-version-file: 'go.mod'

      - name: Set prerelease flag
        if: startsWith(github.ref, 'refs/tags/')
        id: pre
        run: |
          TAG="$GITHUB_REF_NAME"
          if [[ "$TAG" =~ -(beta|alpha|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: startsWith(github.ref, 'refs/tags/')
        run: make -j releases

      - name: Set up JDK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android NDK
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install gomobile
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Android AAR
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gomobile bind -o build/tun2socks-android.aar -target=android -androidapi 23 \
            -ldflags="-s -w" -trimpath \
            ./engine

      - name: Upload Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/*
          draft: true
          prerelease: ${{ steps.pre.outputs.is_prerelease }}
